name: Security Audit

on:
  pull_request:
    paths:
      - '**.py'
      - '**.sol'
      - '**.js'
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint with ruff
        run: ruff check .
      - name: Type check with mypy
        run: mypy web3_auditor web
      - name: Run tests
        run: pytest
      - name: Run audit scan
        if: github.event_name == 'pull_request'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          pip install -e ".[web]"
          changed_files=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.py' '*.sol' '*.js' | head -20)
          if [ -n "$changed_files" ]; then
            echo "Changed files: $changed_files"
          fi
